<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="image/x-icon" href="logo/logo1.ico">
    <title>Malik Music Player</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for compiling React JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Import Map to ensure a single instance of React is used across all modules -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "lucide-react": "https://esm.sh/lucide-react?deps=react@18.3.1"
      }
    }
    </script>

    <style>
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
          width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
          background: rgba(0, 0, 0, 0.1);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
          background: rgba(255, 255, 255, 0.1);
          border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
          background: rgba(168, 85, 247, 0.5);
        }
        
        /* Video Subtitle Styling */
        ::cue {
          background-color: rgba(0, 0, 0, 0.8);
          color: #fff;
          font-family: sans-serif;
          font-size: 1.2rem;
          text-shadow: 2px 2px 4px black;
          border-radius: 4px;
          padding: 4px 8px;
        }
    </style>
</head>
<body class="bg-slate-950 text-gray-100 overflow-hidden select-none font-sans">
    <div id="root"></div>

    <!-- The React Application -->
    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          Play, Pause, Square, SkipForward, SkipBack, Shuffle, Repeat, Repeat1, 
          Volume2, VolumeX, Volume1, Maximize, Minimize, Settings, Upload, 
          Music, Video, FileText, ListVideo, Trash2, Search, History, Heart, 
          FastForward, Rewind, MonitorPlay, X, Plus
        } from 'lucide-react';

        const formatTime = (timeInSeconds) => {
          if (isNaN(timeInSeconds)) return "00:00";
          const m = Math.floor(timeInSeconds / 60).toString().padStart(2, '0');
          const s = Math.floor(timeInSeconds % 60).toString().padStart(2, '0');
          return `${m}:${s}`;
        };

        const THEME = {
          bg: "bg-slate-950",
          glass: "bg-white/5 backdrop-blur-xl border border-white/10",
          glassHover: "hover:bg-white/10 transition-all duration-300",
          textPrimary: "text-gray-100",
          textSecondary: "text-gray-400",
          accent: "text-purple-400",
          neonShadow: "shadow-[0_0_15px_rgba(168,85,247,0.4)]",
          neonShadowBlue: "shadow-[0_0_15px_rgba(59,130,246,0.4)]",
          neonShadowPink: "shadow-[0_0_15px_rgba(236,72,153,0.4)]",
          gradientText: "bg-clip-text text-transparent bg-gradient-to-r from-purple-400 via-blue-400 to-pink-400"
        };

        const Tooltip = ({ children, text }) => {
          const [show, setShow] = useState(false);
          return (
            <div 
              className="relative flex items-center justify-center"
              onMouseEnter={() => setShow(true)}
              onMouseLeave={() => setShow(false)}
            >
              {children}
              {show && (
                <div className="absolute bottom-full mb-2 px-2 py-1 text-xs font-semibold text-white bg-gray-800 rounded-md whitespace-nowrap shadow-lg animate-in fade-in zoom-in duration-200 z-50">
                  {text}
                </div>
              )}
            </div>
          );
        };

        const GlassButton = ({ icon: Icon, onClick, text, active, color = "purple", size = "sm" }) => {
          const baseClasses = `flex items-center justify-center rounded-xl transition-all duration-300 outline-none ${THEME.glass}`;
          const sizeClasses = size === "sm" ? "p-2" : size === "md" ? "p-3" : "p-4";
          
          let colorClasses = THEME.glassHover;
          if (active) {
            if (color === "purple") colorClasses = `bg-purple-500/20 text-purple-400 border-purple-500/50 ${THEME.neonShadow}`;
            if (color === "blue") colorClasses = `bg-blue-500/20 text-blue-400 border-blue-500/50 ${THEME.neonShadowBlue}`;
            if (color === "pink") colorClasses = `bg-pink-500/20 text-pink-400 border-pink-500/50 ${THEME.neonShadowPink}`;
          }

          return (
            <Tooltip text={text}>
              <button onClick={onClick} className={`${baseClasses} ${sizeClasses} ${colorClasses}`}>
                <Icon size={size === "sm" ? 18 : size === "md" ? 22 : 28} />
              </button>
            </Tooltip>
          );
        };

        const AudioVisualizer = ({ mediaRef, isPlaying, type }) => {
          const canvasRef = useRef(null);
          const audioCtxRef = useRef(null);
          const analyzerRef = useRef(null);
          const sourceRef = useRef(null);
          const animationRef = useRef(null);

          useEffect(() => {
            if (!mediaRef.current || type === 'video') return;

            const setupAudio = () => {
              if (!audioCtxRef.current) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtxRef.current = new AudioContext();
                analyzerRef.current = audioCtxRef.current.createAnalyser();
                analyzerRef.current.fftSize = 256;

                try {
                  sourceRef.current = audioCtxRef.current.createMediaElementSource(mediaRef.current);
                  sourceRef.current.connect(analyzerRef.current);
                  analyzerRef.current.connect(audioCtxRef.current.destination);
                } catch (e) {
                  console.warn("Audio context already connected", e);
                }
              }
            };

            mediaRef.current.addEventListener('play', setupAudio, { once: true });

            return () => {
              mediaRef.current?.removeEventListener('play', setupAudio);
            };
          }, [mediaRef, type]);

          useEffect(() => {
            if (type === 'video') return;

            const renderFrame = () => {
              if (!analyzerRef.current || !canvasRef.current) return;
              
              const canvas = canvasRef.current;
              const ctx = canvas.getContext("2d");
              
              canvas.width = canvas.offsetWidth * window.devicePixelRatio;
              canvas.height = canvas.offsetHeight * window.devicePixelRatio;
              
              const bufferLength = analyzerRef.current.frequencyBinCount;
              const dataArray = new Uint8Array(bufferLength);
              analyzerRef.current.getByteFrequencyData(dataArray);

              ctx.clearRect(0, 0, canvas.width, canvas.height);

              const barWidth = (canvas.width / bufferLength) * 2.5;
              let barHeight;
              let x = 0;

              for (let i = 0; i < bufferLength; i++) {
                barHeight = dataArray[i] * (canvas.height / 255) * 0.8;

                const gradient = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - barHeight);
                gradient.addColorStop(0, "rgba(168, 85, 247, 0.8)");
                gradient.addColorStop(1, "rgba(59, 130, 246, 0.8)");

                ctx.fillStyle = gradient;
                ctx.shadowBlur = 15;
                ctx.shadowColor = "rgba(168, 85, 247, 0.5)";

                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                
                ctx.shadowBlur = 0;
                x += barWidth + 2;
              }

              if (isPlaying) {
                animationRef.current = requestAnimationFrame(renderFrame);
              }
            };

            if (isPlaying) {
              if (audioCtxRef.current?.state === 'suspended') {
                audioCtxRef.current.resume();
              }
              renderFrame();
            } else {
              cancelAnimationFrame(animationRef.current);
              const canvas = canvasRef.current;
              if (canvas) {
                const ctx = canvas.getContext("2d");
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(168, 85, 247, 0.3)";
                ctx.fillRect(0, canvas.height - 2, canvas.width, 2);
              }
            }

            return () => cancelAnimationFrame(animationRef.current);
          }, [isPlaying, type]);

          if (type === 'video') return null;

          return (
            <div className="absolute inset-0 flex items-center justify-center p-8 pointer-events-none">
              <div className="w-full h-full max-w-4xl relative">
                <canvas ref={canvasRef} className="w-full h-full absolute bottom-0 opacity-80" />
                <div className="absolute inset-0 flex items-center justify-center">
                  <div className={`w-32 h-32 rounded-full ${THEME.glass} flex items-center justify-center ${isPlaying ? 'animate-pulse shadow-[0_0_50px_rgba(168,85,247,0.5)]' : ''}`}>
                    <Music size={48} className="text-purple-400 opacity-80" />
                  </div>
                </div>
              </div>
            </div>
          );
        };

        const LandingPage = ({ onLaunch }) => {
          return (
            <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center relative overflow-hidden text-gray-100">
              <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-600/20 rounded-full mix-blend-screen filter blur-[100px] animate-[pulse_8s_ease-in-out_infinite]"></div>
              <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-blue-600/20 rounded-full mix-blend-screen filter blur-[100px] animate-[pulse_10s_ease-in-out_infinite_reverse]"></div>
              
              <div className="z-10 text-center space-y-8 p-6 max-w-4xl">
                <div className="inline-flex items-center justify-center p-4 rounded-3xl bg-white/5 border border-white/10 mb-8 backdrop-blur-xl shadow-2xl">
                  <MonitorPlay size={48} className="text-purple-400 mr-4" />
                  <h1 className={`text-5xl md:text-7xl font-black tracking-tighter ${THEME.gradientText}`}>
                    Malik_Music_Player
                  </h1>
                </div>
                
                <p className="text-xl md:text-2xl text-gray-400 font-light max-w-2xl mx-auto leading-relaxed">
                  The futuristic, ultra-premium media experience. Crystal clear audio, stunning 4K video playback, and a real-time neon visualizer.
                </p>

                <div className="pt-8">
                  <button 
                    onClick={onLaunch}
                    className="group relative px-8 py-4 bg-transparent overflow-hidden rounded-full font-bold text-lg tracking-wider uppercase transition-all duration-300"
                  >
                    <div className="absolute inset-0 w-full h-full bg-gradient-to-r from-purple-600 to-blue-600 opacity-80 group-hover:opacity-100 transition-opacity"></div>
                    <div className="absolute inset-0 w-full h-full bg-gradient-to-r from-purple-600 to-blue-600 blur-xl opacity-50 group-hover:opacity-80 transition-opacity"></div>
                    <span className="relative z-10 flex items-center justify-center text-white">
                      Launch Player <Play className="ml-2 group-hover:translate-x-1 transition-transform" />
                    </span>
                  </button>
                </div>

                <div className="grid grid-cols-2 md:grid-cols-4 gap-6 mt-16 text-left">
                  {[
                    { icon: Music, title: "High-Res Audio", desc: "FLAC, MP3, WAV support" },
                    { icon: Video, title: "4K Video", desc: "Hardware accelerated MP4/WebM" },
                    { icon: FileText, title: "Smart Subtitles", desc: "Auto-sync SRT & VTT formats" },
                    { icon: ListVideo, title: "Pro Playlist", desc: "Drag, drop, reorder seamlessly" }
                  ].map((feat, i) => (
                    <div key={i} className={`p-6 rounded-2xl ${THEME.glass} hover:-translate-y-2 transition-transform duration-300`}>
                      <feat.icon className="text-purple-400 mb-4" size={32} />
                      <h3 className="text-lg font-bold text-white mb-2">{feat.title}</h3>
                      <p className="text-sm text-gray-400">{feat.desc}</p>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        };

        function App() {
          const [view, setView] = useState('home');
          
          const [playlist, setPlaylist] = useState([]);
          const [currentIndex, setCurrentIndex] = useState(-1);
          const [searchQuery, setSearchQuery] = useState("");
          
          const [isPlaying, setIsPlaying] = useState(false);
          const [progress, setProgress] = useState(0);
          const [duration, setDuration] = useState(0);
          const [volume, setVolume] = useState(1);
          const [isMuted, setIsMuted] = useState(false);
          const [playbackRate, setPlaybackRate] = useState(1);
          const [isFullscreen, setIsFullscreen] = useState(false);
          
          const [isShuffle, setIsShuffle] = useState(false);
          const [repeatMode, setRepeatMode] = useState(0);
          const [showSidebar, setShowSidebar] = useState(true);

          const mediaRef = useRef(null);
          const playerContainerRef = useRef(null);
          const fileInputRef = useRef(null);
          const subtitleInputRef = useRef(null);

          const currentMedia = playlist[currentIndex] || null;

          const togglePlay = useCallback(() => {
            if (!mediaRef.current || !currentMedia) return;
            if (isPlaying) {
              mediaRef.current.pause();
            } else {
              mediaRef.current.play().catch(e => console.error("Playback failed:", e));
            }
          }, [isPlaying, currentMedia]);

          const stopMedia = useCallback(() => {
            if (!mediaRef.current) return;
            mediaRef.current.pause();
            mediaRef.current.currentTime = 0;
            setIsPlaying(false);
          }, []);

          const playNext = useCallback(() => {
            if (playlist.length === 0) return;
            if (repeatMode === 2 && mediaRef.current) {
              mediaRef.current.currentTime = 0;
              mediaRef.current.play();
              return;
            }

            let nextIdx = currentIndex + 1;
            if (isShuffle) {
              nextIdx = Math.floor(Math.random() * playlist.length);
            } else if (nextIdx >= playlist.length) {
              nextIdx = repeatMode === 1 ? 0 : -1;
            }

            if (nextIdx !== -1) {
              setCurrentIndex(nextIdx);
            } else {
              stopMedia();
            }
          }, [currentIndex, playlist.length, isShuffle, repeatMode, stopMedia]);

          const playPrev = useCallback(() => {
            if (playlist.length === 0) return;
            if (mediaRef.current && mediaRef.current.currentTime > 3) {
              mediaRef.current.currentTime = 0;
              return;
            }
            let prevIdx = currentIndex - 1;
            if (prevIdx < 0) prevIdx = playlist.length - 1;
            setCurrentIndex(prevIdx);
          }, [currentIndex, playlist.length]);

          const skip = (amount) => {
            if (!mediaRef.current) return;
            mediaRef.current.currentTime += amount;
          };

          useEffect(() => {
            const audio = mediaRef.current;
            if (!audio) return;

            const onTimeUpdate = () => setProgress(audio.currentTime);
            const onDurationChange = () => setDuration(audio.duration);
            const onPlay = () => setIsPlaying(true);
            const onPause = () => setIsPlaying(false);
            const onEnded = () => playNext();

            audio.addEventListener('timeupdate', onTimeUpdate);
            audio.addEventListener('durationchange', onDurationChange);
            audio.addEventListener('play', onPlay);
            audio.addEventListener('pause', onPause);
            audio.addEventListener('ended', onEnded);

            return () => {
              audio.removeEventListener('timeupdate', onTimeUpdate);
              audio.removeEventListener('durationchange', onDurationChange);
              audio.removeEventListener('play', onPlay);
              audio.removeEventListener('pause', onPause);
              audio.removeEventListener('ended', onEnded);
            };
          }, [playNext, currentMedia]);

          useEffect(() => {
            if (currentMedia && mediaRef.current) {
              mediaRef.current.src = currentMedia.url;
              mediaRef.current.load();
              mediaRef.current.play().catch(e => console.error("Autoplay prevented:", e));
              setIsPlaying(true);
            }
          }, [currentIndex]);

          useEffect(() => {
            if (mediaRef.current) {
              mediaRef.current.volume = isMuted ? 0 : volume;
            }
          }, [volume, isMuted]);

          useEffect(() => {
            if (mediaRef.current) {
              mediaRef.current.playbackRate = playbackRate;
            }
          }, [playbackRate]);

          useEffect(() => {
            if (view !== 'player') return;
            const handleKeyDown = (e) => {
              if (e.target.tagName.toLowerCase() === 'input') return;
              switch(e.code) {
                case 'Space': e.preventDefault(); togglePlay(); break;
                case 'ArrowRight': skip(10); break;
                case 'ArrowLeft': skip(-10); break;
                case 'ArrowUp': setVolume(v => Math.min(1, v + 0.1)); break;
                case 'ArrowDown': setVolume(v => Math.max(0, v - 0.1)); break;
                case 'KeyM': setIsMuted(m => !m); break;
                case 'KeyF': toggleFullscreen(); break;
              }
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [view, togglePlay]);

          const handleFiles = (files) => {
            const newMedia = Array.from(files).filter(file => 
              file.type.startsWith('audio/') || file.type.startsWith('video/')
            ).map(file => ({
              id: Math.random().toString(36).substr(2, 9),
              file,
              name: file.name,
              type: file.type.startsWith('video/') ? 'video' : 'audio',
              url: URL.createObjectURL(file),
              subtitleUrl: null
            }));

            if (newMedia.length > 0) {
              setPlaylist(prev => [...prev, ...newMedia]);
              if (currentIndex === -1) setCurrentIndex(0);
            }
          };

          const onFileSelect = (e) => {
            if (e.target.files) handleFiles(e.target.files);
          };

          const handleSubtitles = (e) => {
            const file = e.target.files?.[0];
            if (!file || !currentMedia) return;
            
            const url = URL.createObjectURL(file);
            const updatedPlaylist = [...playlist];
            updatedPlaylist[currentIndex].subtitleUrl = url;
            setPlaylist(updatedPlaylist);
          };

          const removeMedia = (e, index) => {
            e.stopPropagation();
            const newList = [...playlist];
            newList.splice(index, 1);
            
            URL.revokeObjectURL(playlist[index].url);
            if (playlist[index].subtitleUrl) URL.revokeObjectURL(playlist[index].subtitleUrl);

            setPlaylist(newList);
            if (index === currentIndex) {
              stopMedia();
              setCurrentIndex(newList.length > 0 ? 0 : -1);
            } else if (index < currentIndex) {
              setCurrentIndex(currentIndex - 1);
            }
          };

          const toggleFullscreen = () => {
            if (!document.fullscreenElement) {
              playerContainerRef.current?.requestFullscreen().catch(err => {
                console.error(`Error attempting to enable fullscreen: ${err.message}`);
              });
              setIsFullscreen(true);
            } else {
              document.exitFullscreen();
              setIsFullscreen(false);
            }
          };

          const renderSidebar = () => {
            const filteredPlaylist = playlist.filter(item => 
              item.name.toLowerCase().includes(searchQuery.toLowerCase())
            );

            return (
              <div className={`w-80 flex flex-col ${THEME.glass} border-r border-t-0 border-b-0 border-l-0 transition-all duration-300 ${showSidebar ? 'translate-x-0' : '-translate-x-full absolute z-20 h-full'}`}>
                <div className="p-4 border-b border-white/10">
                  <div className="flex items-center justify-between mb-4">
                    <h2 className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-blue-400">Library</h2>
                    <button onClick={() => setShowSidebar(false)} className="md:hidden text-gray-400 hover:text-white">
                      <X size={20} />
                    </button>
                  </div>
                  <div className="relative">
                    <Search className="absolute left-3 top-2.5 text-gray-400" size={16} />
                    <input 
                      type="text" 
                      placeholder="Search library..." 
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      className="w-full bg-black/20 border border-white/10 rounded-lg py-2 pl-10 pr-4 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 transition-colors"
                    />
                  </div>
                </div>

                <div className="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar">
                  {filteredPlaylist.length === 0 ? (
                    <div className="flex flex-col items-center justify-center h-full text-gray-500 space-y-4">
                      <Upload size={40} className="opacity-20" />
                      <p className="text-sm text-center px-4">Drag & drop files or click the + button to add media.</p>
                    </div>
                  ) : (
                    filteredPlaylist.map((item, index) => {
                      const actualIndex = playlist.findIndex(p => p.id === item.id);
                      const isActive = actualIndex === currentIndex;
                      return (
                        <div 
                          key={item.id}
                          onClick={() => setCurrentIndex(actualIndex)}
                          className={`group flex items-center p-3 rounded-xl cursor-pointer transition-all duration-200 ${isActive ? 'bg-purple-600/20 border border-purple-500/30' : 'hover:bg-white/5 border border-transparent'}`}
                        >
                          <div className={`w-10 h-10 rounded-lg flex items-center justify-center mr-3 flex-shrink-0 ${isActive ? 'bg-purple-500/30 text-purple-400' : 'bg-black/30 text-gray-400'}`}>
                            {item.type === 'video' ? <Video size={18} /> : <Music size={18} />}
                          </div>
                          <div className="flex-1 min-w-0">
                            <p className={`text-sm font-medium truncate ${isActive ? 'text-purple-300' : 'text-gray-200'}`}>
                              {item.name}
                            </p>
                            <p className="text-xs text-gray-500 mt-1 uppercase tracking-wider">{item.type}</p>
                          </div>
                          <button 
                            onClick={(e) => removeMedia(e, actualIndex)}
                            className="opacity-0 group-hover:opacity-100 p-2 text-gray-400 hover:text-red-400 transition-all"
                          >
                            <Trash2 size={16} />
                          </button>
                        </div>
                      );
                    })
                  )}
                </div>
                
                <div className="p-4 border-t border-white/10 flex justify-between">
                  <button 
                    onClick={() => fileInputRef.current?.click()}
                    className="flex-1 flex items-center justify-center py-2 bg-purple-600/20 hover:bg-purple-600/40 text-purple-300 rounded-lg transition-colors border border-purple-500/30 font-medium text-sm"
                  >
                    <Plus size={16} className="mr-2" /> Add Files
                  </button>
                </div>
              </div>
            );
          };

          const renderMainStage = () => {
            return (
              <div 
                className="flex-1 relative flex flex-col items-center justify-center bg-black overflow-hidden"
                onDragOver={(e) => e.preventDefault()}
                onDrop={(e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); }}
              >
                <div className={`absolute inset-0 bg-gradient-to-t from-purple-900/20 to-transparent pointer-events-none transition-opacity duration-1000 ${isPlaying ? 'opacity-100' : 'opacity-30'}`} />

                {!currentMedia ? (
                  <div className="flex flex-col items-center z-10 text-gray-400 animate-pulse">
                    <MonitorPlay size={64} className="mb-6 text-purple-500/50" />
                    <h2 className="text-2xl font-light tracking-widest text-white/50">NO MEDIA LOADED</h2>
                    <p className="mt-2 text-sm">Drag and drop files here to begin</p>
                  </div>
                ) : (
                  <div className="relative w-full h-full flex items-center justify-center">
                    <AudioVisualizer mediaRef={mediaRef} isPlaying={isPlaying} type={currentMedia.type} />

                    <video
                      ref={mediaRef}
                      className={`max-w-full max-h-full z-10 transition-opacity duration-500 ${currentMedia.type === 'audio' ? 'opacity-0 absolute' : 'opacity-100 shadow-2xl'}`}
                      onClick={togglePlay}
                      crossOrigin="anonymous" 
                    >
                      {currentMedia.subtitleUrl && (
                        <track 
                          label="English" 
                          kind="subtitles" 
                          srcLang="en" 
                          src={currentMedia.subtitleUrl} 
                          default 
                        />
                      )}
                    </video>
                    
                    {currentMedia.type === 'audio' && (
                      <div className="absolute top-10 left-0 right-0 text-center z-20 pointer-events-none">
                        <h2 className="text-3xl font-bold text-white drop-shadow-lg px-4 truncate max-w-2xl mx-auto">
                          {currentMedia.name}
                        </h2>
                      </div>
                    )}
                  </div>
                )}

                <div className="absolute top-4 left-4 right-4 flex justify-between z-30 pointer-events-auto">
                  {!showSidebar && (
                    <button onClick={() => setShowSidebar(true)} className="p-2 bg-black/50 hover:bg-black/80 rounded-lg text-white backdrop-blur-md transition-all">
                      <ListVideo size={20} />
                    </button>
                  )}
                  <div className="flex gap-2 ml-auto">
                    <button 
                      onClick={() => setPlaybackRate(r => r >= 2 ? 0.5 : r + 0.25)}
                      className="px-3 py-1 bg-black/50 hover:bg-black/80 rounded-lg text-white text-xs font-bold backdrop-blur-md border border-white/10"
                      title="Playback Speed"
                    >
                      {playbackRate}x
                    </button>
                    {currentMedia?.type === 'video' && (
                      <button 
                        onClick={() => subtitleInputRef.current?.click()}
                        className="p-2 bg-black/50 hover:bg-black/80 rounded-lg text-white backdrop-blur-md border border-white/10"
                        title="Upload Subtitles (.vtt)"
                      >
                        <FileText size={16} />
                      </button>
                    )}
                  </div>
                </div>
              </div>
            );
          };

          const renderControlBar = () => {
            return (
              <div className={`h-24 ${THEME.glass} border-t-0 border-l-0 border-r-0 flex flex-col z-30 px-6 pb-2 relative`}>
                <div className="absolute top-0 left-0 right-0 h-1.5 bg-gray-800 cursor-pointer group" onClick={(e) => {
                  const rect = e.currentTarget.getBoundingClientRect();
                  const pos = (e.clientX - rect.left) / rect.width;
                  if (mediaRef.current) mediaRef.current.currentTime = pos * duration;
                }}>
                  <div 
                    className="h-full bg-gradient-to-r from-purple-500 to-blue-500 relative transition-all duration-100 ease-linear"
                    style={{ width: `${duration ? (progress / duration) * 100 : 0}%` }}
                  >
                    <div className="absolute right-0 top-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full shadow-[0_0_10px_rgba(255,255,255,0.8)] opacity-0 group-hover:opacity-100 transition-opacity scale-150 transform translate-x-1/2"></div>
                  </div>
                </div>

                <div className="flex-1 flex items-center justify-between mt-2">
                  <div className="w-1/3 flex items-center overflow-hidden">
                    {currentMedia && (
                      <>
                        <div className="w-12 h-12 rounded-lg bg-black/40 flex items-center justify-center mr-4 flex-shrink-0 border border-white/10 shadow-lg">
                          {currentMedia.type === 'video' ? <Video className="text-blue-400" /> : <Music className="text-purple-400" />}
                        </div>
                        <div className="truncate">
                          <p className="text-sm font-bold text-white truncate">{currentMedia.name}</p>
                          <p className="text-xs text-gray-400 font-mono mt-1">
                            {formatTime(progress)} / {formatTime(duration)}
                          </p>
                        </div>
                      </>
                    )}
                  </div>

                  <div className="w-1/3 flex flex-col items-center justify-center">
                    <div className="flex items-center space-x-4">
                      <GlassButton icon={Shuffle} onClick={() => setIsShuffle(!isShuffle)} active={isShuffle} color="blue" text="Shuffle" />
                      <GlassButton icon={SkipBack} onClick={playPrev} text="Previous" />
                      
                      <button 
                        onClick={togglePlay}
                        className={`w-14 h-14 flex items-center justify-center rounded-full bg-gradient-to-r from-purple-600 to-blue-600 text-white hover:scale-105 transition-transform shadow-lg ${isPlaying ? THEME.neonShadow : 'shadow-purple-900/50'}`}
                      >
                        {isPlaying ? <Pause size={28} fill="currentColor" /> : <Play size={28} fill="currentColor" className="ml-1" />}
                      </button>
                      
                      <GlassButton icon={SkipForward} onClick={playNext} text="Next" />
                      <GlassButton 
                        icon={repeatMode === 2 ? Repeat1 : Repeat} 
                        onClick={() => setRepeatMode((r) => (r + 1) % 3)} 
                        active={repeatMode > 0} 
                        color="pink"
                        text={repeatMode === 0 ? "Repeat Off" : repeatMode === 1 ? "Repeat All" : "Repeat One"} 
                      />
                    </div>
                  </div>

                  <div className="w-1/3 flex items-center justify-end space-x-4">
                    <div className="flex items-center space-x-2 group">
                      <button onClick={() => setIsMuted(!isMuted)} className="text-gray-400 hover:text-white transition-colors">
                        {isMuted || volume === 0 ? <VolumeX size={20} /> : volume < 0.5 ? <Volume1 size={20} /> : <Volume2 size={20} />}
                      </button>
                      <input 
                        type="range" 
                        min="0" max="1" step="0.01" 
                        value={isMuted ? 0 : volume}
                        onChange={(e) => {
                          setVolume(parseFloat(e.target.value));
                          if (parseFloat(e.target.value) > 0) setIsMuted(false);
                        }}
                        className="w-24 h-1.5 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-purple-500 opacity-70 group-hover:opacity-100 transition-opacity"
                      />
                    </div>
                    
                    <div className="w-px h-6 bg-white/10 mx-2"></div>
                    
                    <GlassButton icon={Rewind} onClick={() => skip(-10)} text="-10s" />
                    <GlassButton icon={FastForward} onClick={() => skip(10)} text="+10s" />
                    <GlassButton icon={isFullscreen ? Minimize : Maximize} onClick={toggleFullscreen} text="Fullscreen" />
                  </div>
                </div>
              </div>
            );
          };

          if (view === 'home') {
            return <LandingPage onLaunch={() => setView('player')} />;
          }

          return (
            <div 
              className="h-screen w-full bg-slate-950 text-gray-100 flex flex-col overflow-hidden font-sans select-none"
              ref={playerContainerRef}
            >
              <input 
                type="file" 
                multiple 
                ref={fileInputRef} 
                onChange={onFileSelect} 
                className="hidden" 
                accept="audio/*,video/*"
              />
              <input 
                type="file" 
                ref={subtitleInputRef} 
                onChange={handleSubtitles} 
                className="hidden" 
                accept=".vtt"
              />

              <div className="flex-1 flex overflow-hidden relative">
                {renderSidebar()}
                {renderMainStage()}
              </div>
              
              {renderControlBar()}
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
